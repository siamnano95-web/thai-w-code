<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      /* สไตล์ของปุ่มที่จะเด้งขึ้นมา */
      #audio-panel {
        position: fixed;
        bottom: 50px;
        left: 50%;
        transform: translateX(-50%);
        display: none; /* ซ่อนไว้ก่อนสแกนติด */
        flex-direction: row;
        gap: 20px;
        z-index: 999;
      }
      .btn {
        padding: 15px 25px;
        font-size: 20px;
        border: none;
        border-radius: 50px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      }
      .btn-th { background-color: #28a745; }
      .btn-en { background-color: #007bff; }
    </style>
  </head>
  <body>
    <audio id="sound-th" src="ยินดีต้อนรับ.mp3"></audio>
    <audio id="sound-en" src="Welcometo.mp3"></audio>

    <div id="audio-panel">
      <button class="btn btn-th" onclick="changeLang('th')">🇹🇭 ภาษาไทย</button>
      <button class="btn btn-en" onclick="changeLang('en')">🇺🇸 English</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-plane color="#FFD700" opacity="0.3" position="0 0 0" height="1" width="1.2" rotation="0 0 0"></a-plane>
        </a-entity>
    </a-scene>

    <script>
      const target = document.querySelector('#target');
      const panel = document.querySelector('#audio-panel');
      let currentAudio = null;

      // เมื่อสแกนติด -> แสดงปุ่ม
      target.addEventListener("targetFound", () => {
        panel.style.display = "flex";
      });

      // เมื่อหันกล้องหนี -> ซ่อนปุ่มและหยุดเสียง
      target.addEventListener("targetLost", () => {
        panel.style.display = "none";
        stopSound();
      });

      function changeLang(lang) {
        stopSound();
        const audioId = (lang === 'th') ? 'sound-th' : 'sound-en';
        currentAudio = document.getElementById(audioId);
        if (currentAudio) {
          currentAudio.play().catch(e => alert("กรุณากดที่หน้าจอเพื่อเล่นเสียง"));
        }
      }

      function stopSound() {
        const th = document.getElementById('sound-th');
        const en = document.getElementById('sound-en');
        if(th) { th.pause(); th.currentTime = 0; }
        if(en) { en.pause(); en.currentTime = 0; }
      }
    </script>
  </body>
</html>
